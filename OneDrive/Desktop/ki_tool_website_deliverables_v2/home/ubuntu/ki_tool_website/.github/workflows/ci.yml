name: CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Wenn Du einen Build-Prozess hast, hier aktivieren:
      # - name: Install Dependencies
      #   run: npm ci
      # - name: Build
      #   run: npm run build

      - name: Deploy to Server
        uses: easingthemes/ssh-deploy@v2
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          ARGS: "-r --delete"
          SOURCE: "home/ubuntu/ki_tool_website"    # <-- Nur dieses Unterverzeichnis deployen
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: deployuser
          TARGET: "/var/www/ki-tool-website"
